<div class="dashboard-container">
  <!-- Header Section -->
  <div class="dashboard-header">
    <h1 class="dashboard-title">
      <mat-icon class="title-icon">dashboard</mat-icon>
      ภาพรวมสินค้าคงเหลือ
    </h1>
    <p class="dashboard-subtitle">กำลังล่าสินค้าที่คงเหลือ</p>
  </div>

  <!-- Stats Grid -->
  <div class="stats-grid">
    <mat-card *ngFor="let item of remainingStock$ | async" class="stat-card" [class.low-stock]="item.quantity <= 0 || item.quantity < 5">
      <div class="card-content">
        <div class="card-info">
          <h3 class="item-name">{{ item.name }}</h3>
          <p class="item-label">จำนวนจ้องคงเหลือ</p>
        </div>
        <div class="card-value" [class.critical]="item.quantity <= 0" [class.warning]="item.quantity > 0 && item.quantity < 5">
          {{ item.quantity }}
        </div>
      </div>
      <div class="card-footer">
        <div class="status-indicator" [class.in-stock]="item.quantity > 5" [class.low-stock]="item.quantity > 0 && item.quantity < 5" [class.out-of-stock]="item.quantity <= 0"></div>
        <span class="status-text" [class.critical]="item.quantity <= 0" [class.warning]="item.quantity > 0 && item.quantity < 5">
          {{ item.quantity <= 0 ? 'หมด' : item.quantity < 5 ? 'ใจแี' : 'เพิยงพอ' }}
        </span>
      </div>
    </mat-card>
  </div>

  <!-- Empty State -->
  <div class="empty-state" *ngIf="!(remainingStock$ | async)?.length">
    <mat-card class="empty-card">
      <div class="empty-content">
        <mat-icon class="empty-icon">inventory_2</mat-icon>
        <h2>ยังไม่มีข้อมูลคลังสินค้า</h2>
        <p class="empty-text">กรุณาทำรายการ Stock In เพื่อเริ่มต้น</p>
      </div>
    </mat-card>
  </div>
</div>
