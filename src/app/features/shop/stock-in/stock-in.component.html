<div class="stock-in-container">
  <mat-card class="form-card">
    <mat-card-header>
      <div class="header-content">
        <h2 class="form-title">
          <mat-icon class="title-icon">move_to_inbox</mat-icon>
          รับของเข้าร้าน (Stock In)
        </h2>
        <p class="form-subtitle">บันทึกรายการสินค้าด้วยหน่วย ราคา/หน่วย และคำนวณต้นทุนอัตโนมัติ</p>
      </div>
    </mat-card-header>

    <mat-card-content>
      <form class="stock-in-form" [formGroup]="stockInForm" (ngSubmit)="saveStockIn()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>ชื่อสินค้า *</mat-label>
          <input matInput formControlName="itemName" placeholder="เช่น เนื้อหมู, ข้าวคั่ว, น้ำเปล่า">
          <mat-icon matSuffix>inventory_2</mat-icon>
        </mat-form-field>

        <div class="field-row">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>หน่วย *</mat-label>
            <mat-select formControlName="unit">
              <mat-option *ngFor="let unit of unitOptions" [value]="unit">{{ unit }}</mat-option>
            </mat-select>
            <mat-icon matSuffix>straighten</mat-icon>
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>จำนวน *</mat-label>
            <input matInput type="number" min="0.0001" step="0.01" formControlName="quantity">
            <mat-icon matSuffix>numbers</mat-icon>
          </mat-form-field>
        </div>

        <div class="field-row">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>ราคา / หน่วย *</mat-label>
            <input matInput type="number" min="0.0001" step="0.01" formControlName="pricePerUnit">
            <mat-icon matSuffix>sell</mat-icon>
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width readonly-field">
            <mat-label>ต้นทุนรวม (อัตโนมัติ)</mat-label>
            <input matInput type="number" formControlName="totalCost" readonly>
            <mat-icon matSuffix>attach_money</mat-icon>
          </mat-form-field>
        </div>

        <div class="button-group">
          <button mat-raised-button color="primary" type="submit" [disabled]="stockInForm.invalid" class="btn-save">
            <mat-icon>check_circle</mat-icon>
            บันทึกรับเข้า
          </button>
          <button mat-stroked-button type="button" (click)="resetForm()" class="btn-reset">
            <mat-icon>refresh</mat-icon>
            ล้างฟอร์ม
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>

  <mat-card class="success-message alert-card" *ngIf="savedStatus">
    <div class="alert-content">
      <mat-icon class="alert-icon">check_circle</mat-icon>
      <div>
        <p class="alert-title">บันทึกสำเร็จ</p>
        <p class="alert-message">บันทึกรายการ <strong>{{ lastSavedName }}</strong> สำเร็จ!</p>
      </div>
    </div>
  </mat-card>
</div>
